<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Privacy Guard — Options</title>
    <style>
      body { width: 520px; padding: 16px; }
      h1 { font-size: 18px; margin: 0 0 4px; }
      .sub { color: var(--muted); margin: 0 0 16px; }
      fieldset { border: 1px solid var(--border); border-radius: 8px; margin: 0 0 16px; padding: 12px; }
      legend { padding: 0 6px; color: var(--muted); }
      .row { display: flex; gap: 8px; margin: 6px 0; }
      input[type="text"] { flex: 1; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; }
      #allowlist { list-style: none; margin: 8px 0 0; padding: 0; }
      #allowlist li { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed var(--border); }
      #allowlist button { background: transparent; color: var(--red); border: 0; cursor: pointer; }
      table { border-collapse: collapse; width: 100%; margin-top: 8px; }
      th, td { border-bottom: 1px solid var(--border); padding: 6px 8px; text-align: left; font-size: 12px; }
      th { color: var(--muted); font-weight: 600; }
      td.origin { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .g { display: inline-block; min-width: 18px; text-align: center; border-radius: 4px; padding: 1px 5px; color: #fff; font-weight: 700; }
      .g.A, .g.B { background: var(--green); }
      .g.C { background: var(--amber); }
      .g.D, .g.F { background: var(--red); }
      .legend-row { display: flex; justify-content: space-between; align-items: center; }
      .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
      .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px; border-left-width: 4px; }
      .card--red { border-left-color: var(--red); }
      .card--amber { border-left-color: var(--amber); }
      .card--green { border-left-color: var(--green); }
      .card-num { font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; }
      .card-label { color: var(--muted); font-size: 11px; margin-top: 2px; }
      .since { color: var(--muted); font-size: 11px; margin-bottom: 8px; }
      .bars { list-style: none; margin: 0; padding: 0; }
      .bars li { margin: 6px 0; }
      .bars .row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 2px; }
      .bars .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 340px; }
      .bars .track { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
      .bars .fill { background: var(--red); height: 100%; }
    </style>
  </head>
  <body>
    <h1>Privacy Guard</h1>
    <p class="sub">Anti-fingerprint protection &amp; per-site Privacy Score.</p>

    <div class="cards">
      <div class="card card--red">
        <div class="card-num" id="stTrackers">0</div>
        <div class="card-label">Trackers blocked</div>
      </div>
      <div class="card card--amber">
        <div class="card-num" id="stProbes">0</div>
        <div class="card-label">Fingerprint probes stopped</div>
      </div>
      <div class="card card--green">
        <div class="card-num" id="stSites">0</div>
        <div class="card-label">Sites protected</div>
      </div>
    </div>

    <fieldset>
      <legend class="legend-row">
        <span>Top blocked trackers</span>
        <button id="clearStats" class="ghost">Reset stats</button>
      </legend>
      <div class="since" id="stSince"></div>
      <ul id="topTrackers" class="bars"></ul>
    </fieldset>

    <fieldset>
      <legend>Default protection level</legend>
      <select id="level">
        <option value="off">Off — no spoofing</option>
        <option value="balanced">Balanced — recommended</option>
        <option value="strict">Strict — maximum noise</option>
      </select>
    </fieldset>

    <fieldset>
      <legend>Allowlist (spoofing disabled)</legend>
      <div class="row">
        <input id="newOrigin" type="text" placeholder="https://example.com" />
        <button id="add" class="ghost">Add</button>
      </div>
      <ul id="allowlist"></ul>
    </fieldset>

    <fieldset>
      <legend class="legend-row">
        <span>Per-site history</span>
        <button id="clearHistory" class="ghost">Clear</button>
      </legend>
      <table>
        <thead>
          <tr><th>Site</th><th>Grade</th><th>Score</th><th>Trackers</th><th>FP probes</th><th>Visits</th></tr>
        </thead>
        <tbody id="history"></tbody>
      </table>
    </fieldset>

    <script src="options.js"></script>
  </body>
</html>
