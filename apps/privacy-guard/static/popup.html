<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Privacy Guard</title>
  </head>
  <body>
    <header>
      <div class="brand-row">
        <div class="brand">Privacy Guard</div>
        <label class="switch master" title="Pause/resume all protection">
          <input type="checkbox" id="masterToggle" />
          <span class="slider"></span>
        </label>
      </div>
      <div id="origin" class="origin">—</div>
    </header>

    <div id="pausedBanner" class="paused-banner" hidden>
      Protection paused globally — nothing is being spoofed or blocked.
    </div>

    <section class="score">
      <div id="grade" class="grade grade--na">–</div>
      <div class="score-meta">
        <div id="scoreNum" class="score-num">—</div>
        <div class="score-label">Privacy Score</div>
      </div>
    </section>

    <section class="chips">
      <div class="chip"><span id="chProbes" class="chip-num">0</span><span class="chip-label">FP probes</span></div>
      <div class="chip"><span id="chBlocked" class="chip-num">0</span><span class="chip-label">Blocked here</span></div>
      <div class="chip"><span id="chHttps" class="chip-num">—</span><span class="chip-label">Transport</span></div>
    </section>

    <section class="controls">
      <label for="level">Protection</label>
      <select id="level">
        <option value="off">Off</option>
        <option value="balanced">Balanced</option>
        <option value="strict">Strict</option>
      </select>
      <button id="allowToggle" class="ghost">Allowlist this site</button>
    </section>

    <section class="breakdown">
      <h3>Breakdown</h3>
      <ul id="breakdown"></ul>
    </section>

    <section class="blocked">
      <h3>Blocked on this site</h3>
      <p class="hint">Toggle off anything that breaks the page — it’ll be allowed only here.</p>
      <ul id="blocked"></ul>
    </section>

    <footer>
      <a id="openOptions" href="#">Options & allowlist →</a>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
